<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us</title>

  <!-- Bootstrap CDN -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background: linear-gradient(to right, #dbeafe, #f0f9ff);
      font-family: Arial, sans-serif;
    }

    /* Navbar */

    .navbar{
      background: linear-gradient(90deg, #0d6efd, #6610f2);
      padding: 12px 20px;
    }

    .navbar-brand{
      color: white !important;
      font-size: 28px;
      font-weight: bold;
    }

    .nav-link{
      color: white !important;
      font-size: 18px;
      margin-left: 15px;
      transition: 0.3s;
    }

    .nav-link:hover{
      color: yellow !important;
      transform: scale(1.1);
    }

    .active{
      border-bottom: 2px solid yellow;
    }

    /* Contact Section */

    .contact-box{
      background: white;
      border-radius: 15px;
      padding: 35px;
    }

    .form-control,
    textarea{
      border-radius: 10px;
    }

    .btn-custom{
      background: #0d6efd;
      color: white;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn-custom:hover{
      background: #000;
      color: white;
    }

    .info-box{
      background: #f8f9fa;
      border-radius: 15px;
      padding: 25px;
      height: 100%;
    }

    .info-box h3{
      color: #0d6efd;
      margin-bottom: 20px;
    }

    .info-box p{
      font-size: 17px;
      margin-bottom: 15px;
    }

    iframe{
      width: 100%;
      height: 250px;
      border: 0;
      border-radius: 15px;
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <!-- Navbar Start -->

  <nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

      <a class="navbar-brand" href="index.html">
        MyWebsite
      </a>

      <button
        class="navbar-toggler bg-light"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div
        class="collapse navbar-collapse justify-content-end"
        id="navbarNav"
      >

        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="home.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="registration.html">
              Registration
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="login.html">
              Login
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="gallery.html">
              Gallery
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="contact.html">
              Contact Us
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Navbar End -->


  <!-- Contact Section -->

  <div class="container py-5">

    <div class="text-center mb-5">

      <h1 class="fw-bold text-primary">
        Contact Us
      </h1>

      <p class="text-muted">
        Feel free to contact us anytime
      </p>

    </div>

    <div class="row g-4">

      <!-- Left Side Form -->

      <div class="col-lg-7">

        <div class="contact-box shadow-lg">

          <h3 class="mb-4">
            Send Message
          </h3>

          <form>

            <!-- Name -->

            <div class="mb-3">

              <label class="form-label">
                Full Name
              </label>

              <input
                type="text"
                class="form-control"
                placeholder="Enter your name"
              >

            </div>

            <!-- Email -->

            <div class="mb-3">

              <label class="form-label">
                Email Address
              </label>

              <input
                type="email"
                class="form-control"
                placeholder="example@gmail.com"
              >

            </div>

            <!-- Subject -->

            <div class="mb-3">

              <label class="form-label">
                Subject
              </label>

              <input
                type="text"
                class="form-control"
                placeholder="Enter subject"
              >

            </div>

            <!-- Message -->

            <div class="mb-4">

              <label class="form-label">
                Message
              </label>

              <textarea
                class="form-control"
                rows="5"
                placeholder="Write your message..."
              ></textarea>

            </div>

            <!-- Button -->

            <button
              type="submit"
              class="btn btn-custom px-4 py-2"
            >
              Send Message
            </button>

          </form>

        </div>

      </div>

      <!-- Right Side Info -->

      <div class="col-lg-5">

        <div class="info-box shadow-lg">

          <h3>
            Company Information
          </h3>

          <p>
            📍 <strong>Address:</strong><br>
            SG Highway, Ahmedabad, Gujarat, India
          </p>

          <p>
            📞 <strong>Contact:</strong><br>
            +91 9876543210
          </p>

          <p>
            ✉ <strong>Email:</strong><br>
            info@mywebsite.com
          </p>

          <!-- Google Map -->

          <iframe
            src="https://www.google.com/maps?q=Ahmedabad&output=embed"
            allowfullscreen=""
            loading="lazy"
          ></iframe>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
