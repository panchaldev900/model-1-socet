<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>

  <!-- Bootstrap CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>

    body{
      background: linear-gradient(to right, #dbeafe, #f0f9ff);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Navbar */

    .navbar{
      background: linear-gradient(90deg, #0d6efd, #6610f2);
      padding: 12px 20px;
    }

    .navbar-brand{
      color: white !important;
      font-size: 28px;
      font-weight: bold;
    }

    .nav-link{
      color: white !important;
      font-size: 18px;
      margin-left: 15px;
      transition: 0.3s;
    }

    .nav-link:hover{
      color: yellow !important;
      transform: scale(1.1);
    }

    .active{
      border-bottom: 2px solid yellow;
    }

    /* Register Form */

    .register-box{
      background: #fff;
      border-radius: 15px;
      padding: 35px;
    }

    .form-control,
    .form-select{
      border-radius: 10px;
    }

    .btn-custom{
      background-color: #0055d4;
      color: white;
      font-weight: bold;
      border-radius: 10px;
    }

    .btn-custom:hover{
      background-color: #000000;
    }

  </style>
</head>

<body>

  <!-- Navbar Start -->

  <nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

      <!-- Logo -->

      <a class="navbar-brand" href="index.html">
        MyWebsite
      </a>

      <!-- Mobile Button -->

      <button
        class="navbar-toggler bg-light"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->

      <div
        class="collapse navbar-collapse justify-content-end"
        id="navbarNav"
      >

        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" href="home.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="registration.html">
              Registration
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="login.html">
              Login
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="gallery.html">
              Gallery
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="contact.html">
              Contact Us
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Navbar End -->


  <!-- Registration Section -->

  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-5 col-md-7">

        <div class="register-box shadow-lg">

          <!-- Heading -->

          <div class="text-center mb-4">

            <h1>Create Account</h1>

            <p class="text-muted">
              Fill in your details below
            </p>

          </div>

          <form>

            <!-- Name -->

            <div class="mb-3">

              <label class="form-label">
                Name
              </label>

              <input
                type="text"
                class="form-control"
                placeholder="Your Name"
              >

            </div>

            <!-- Email -->

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                class="form-control"
                placeholder="example@gmail.com"
              >

            </div>

            <!-- Mobile -->

            <div class="mb-3">

              <label class="form-label">
                Mobile Number
              </label>

              <input
                type="tel"
                class="form-control"
                placeholder="+91 9902011110"
              >

            </div>

            <!-- Password -->

            <div class="mb-3">

              <label class="form-label">
                Password
              </label>

              <input
                type="password"
                class="form-control"
                placeholder="Enter Password"
              >

            </div>

            <!-- City -->

            <div class="mb-3">

              <label class="form-label">
                City
              </label>

              <select class="form-select">

                <option selected>
                  Select City
                </option>

                <option>
                  Ahmedabad
                </option>

                <option>
                  Surat
                </option>

                <option>
                  Rajkot
                </option>

                <option>
                  Vadodara
                </option>

              </select>

            </div>

            <!-- Checkbox -->

            <div class="form-check mb-4">

              <input
                class="form-check-input"
                type="checkbox"
                id="agree"
              >

              <label
                class="form-check-label"
                for="agree"
              >
                Accept Terms & Conditions
              </label>

            </div>

            <!-- Button -->

            <div class="d-grid">

              <button
                type="submit"
                class="btn btn-custom py-2"
              >
                Sign Up
              </button>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
