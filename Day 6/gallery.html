<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gallery Page</title>

  <!-- Bootstrap CDN -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background: linear-gradient(to right, #dbeafe, #f0f9ff);
      font-family: Arial, sans-serif;
    }

    /* Navbar */

    .navbar{
      background: linear-gradient(90deg, #0d6efd, #6610f2);
      padding: 12px 20px;
    }

    .navbar-brand{
      color: white !important;
      font-size: 28px;
      font-weight: bold;
    }

    .nav-link{
      color: white !important;
      margin-left: 15px;
      font-size: 18px;
      transition: 0.3s;
    }

    .nav-link:hover{
      color: yellow !important;
      transform: scale(1.1);
    }

    .active{
      border-bottom: 2px solid yellow;
    }

    /* Gallery */

    .gallery-title{
      text-align: center;
      margin-bottom: 40px;
    }

    .gallery-title h1{
      color: #0d6efd;
      font-size: 45px;
      font-weight: bold;
    }

    .gallery-box{
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      background: white;
    }

    .gallery-box img{
      width: 100%;
      height: 250px;
      object-fit: cover;
      transition: 0.5s;
      display: block;
    }

    /* Image Hover */

    .gallery-box:hover img{
      transform: scale(1.1);
    }

  </style>
</head>

<body>

  <!-- Navbar Start -->

  <nav class="navbar navbar-expand-lg">

    <div class="container-fluid">

      <!-- Logo -->

      <a class="navbar-brand" href="home.html">
        MyWebsite
      </a>

      <!-- Mobile Button -->

      <button
        class="navbar-toggler bg-light"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->

      <div
        class="collapse navbar-collapse justify-content-end"
        id="navbarNav"
      >

        <ul class="navbar-nav">

          <!-- Home -->

          <li class="nav-item">
            <a class="nav-link" href="home.html">
              Home
            </a>
          </li>

          <!-- Registration -->

          <li class="nav-item">
            <a class="nav-link" href="form_b.html">
              Registration
            </a>
          </li>

          <!-- Login -->

          <li class="nav-item">
            <a class="nav-link" href="login.html">
              Login
            </a>
          </li>

          <!-- Gallery -->

          <li class="nav-item">
            <a class="nav-link active" href="gallery.html">
              Gallery
            </a>
          </li>

          <!-- Contact -->

          <li class="nav-item">
            <a class="nav-link" href="contact.html">
              Contact Us
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Navbar End -->


  <!-- Gallery Section -->

  <div class="container py-5">

    <div class="gallery-title">

      <h1>
        Image Gallery
      </h1>

      <p class="text-muted">
        Simple Hover Image Scale Effect
      </p>

    </div>

    <div class="row g-4">

      <!-- Image 1 -->

      <div class="col-lg-4 col-md-6">

        <div class="gallery-box">
          <img
            src="https://picsum.photos/id/1015/600/400"
            alt="Gallery Image"
          >
        </div>

      </div>

      <!-- Image 2 -->

      <div class="col-lg-4 col-md-6">

        <div class="gallery-box">
          <img
            src="https://picsum.photos/id/1025/600/400"
            alt="Gallery Image"
          >
        </div>

      </div>

      <!-- Image 3 -->

      <div class="col-lg-4 col-md-6">

        <div class="gallery-box">
          <img
            src="https://picsum.photos/id/1035/600/400"
            alt="Gallery Image"
          >
        </div>

      </div>

      <!-- Image 4 -->

      <div class="col-lg-4 col-md-6">

        <div class="gallery-box">
          <img
            src="https://picsum.photos/id/1040/600/400"
            alt="Gallery Image"
          >
        </div>

      </div>

      <!-- Image 5 -->

      <div class="col-lg-4 col-md-6">

        <div class="gallery-box">
          <img
            src="https://picsum.photos/id/1050/600/400"
            alt="Gallery Image"
          >
        </div>

      </div>

      <!-- Image 6 -->

      <div class="col-lg-4 col-md-6">

        <div class="gallery-box">
          <img
            src="https://picsum.photos/id/1060/600/400"
            alt="Gallery Image"
          >
        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
