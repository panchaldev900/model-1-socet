<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Concepts Example</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
    }

    .navbar{
      position:fixed;
      top:0;
      width:100%;
      background:black;
      color:white;
      padding:15px;
      z-index:1000;
    }

    .container{
      margin-top:70px;
      padding:20px;
    }

    .sticky-title{
      position:sticky;
      top:60px;
      background:orange;
      padding:8px;
      width:200px;
      text-align:center;
      border-radius:5px;
      margin-bottom:20px;
    }

    .image{
      float:left;
      width:200px;
      margin-right:20px;
    }

    .clear{
      clear:both;
    }

    .card{
      position:relative;
      width:250px;
      height:150px;
      background:lightblue;
      margin-top:30px;
      padding:20px;
    }

    .badge{
      position:absolute;
      top:10px;
      right:10px;
      background:red;
      color:white;
      padding:5px 10px;
      border-radius:5px;
    }

    /* MEDIA QUERY */
    @media screen and (max-width:768px){

      body{
        background:#f0f0f0;
      }

      .image{
        float:none;
        display:block;
        width:100%;
        margin-bottom:15px;
      }

      .card{
        width:100%;
      }

      .navbar{
        background:darkblue;
      }

      .sticky-title{
        width:100%;
      }

    }

  </style>
</head>

<body>
  <div class="navbar">
    My Website Navbar
  </div>

  <div class="container">
    <div class="sticky-title">
      Sticky Box
    </div>

    <img 
      src="https://images.unsplash.com/photo-1579353977828-2a4eab540b9a?fm=jpg&q=60&w=3000&auto=format&fit=crop"
      class="image"
      alt="Sample Image"
    >

    <p>
      This text wraps around the image using float property.
      Lorem ipsum dolor sit amet consectetur adipisicing elit.
      Float helps place elements left or right.
    </p>

    <div class="clear"></div>

    <div class="card">

      <div class="badge">
        New
      </div>

      <h3>Product Card</h3>

      <p>
        Badge uses absolute positioning.
      </p>

    </div>

  </div>

</body>
</html>
