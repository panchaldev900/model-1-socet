<!DOCTYPE html>
<html lang="en">
<head>

<title>Invitation Card</title>

<style>
    body{
        margin:0;
        padding:0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #ffdde1, #ee9ca7);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        width:400px;
        background:white;
        padding:30px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }

    .card h1{
        color:#d6336c;
        font-size:36px;
        margin-bottom:10px;
    }

    .card h2{
        color:#444;
        margin-bottom:20px;
    }

    .details{
        font-size:18px;
        color:#555;
        line-height:1.8;
    }

    .footer{
        margin-top:25px;
        font-weight:bold;
        color:#d6336c;
    }

    .btn{
        display:inline-block;
        margin-top:20px;
        padding:10px 20px;
        background:#d6336c;
        color:white;
        text-decoration:none;
        border-radius:30px;
        transition:0.3s;
    }

    .btn:hover{
        background:#a61e4d;
    }
</style>

</head>
<body>

<div class="card">
    <h1>You're Invited!</h1>
    <h2>Birthday Celebration</h2>

    <div class="details">
        <p><strong>Date:</strong> 25 May 2026</p>
        <p><strong>Time:</strong> 6:00 PM</p>
        <p><strong>Venue:</strong>Taj skyline SBR Road</p>
    </div>

    <a href="#" class="btn">Join Us</a>

    <div class="footer">
        We look forward to celebrating with you!
    </div>
</div>

</body>
</html>
