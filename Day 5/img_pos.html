<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Hover Effect</title>

<style>

body{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.img-container{
    position:relative;
    width:20%;
    overflow:hidden;
    border-radius:14px;
}

/* scale image smoothly */
.img-container img{
    display:block;
    width:100%;
    height:auto;
    border-radius:14px;
    transition:transform 0.5s ease;
}

/* image zoom */
.img-container:hover img{
    transform:scale(1.2);
}

/* overlay */
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    opacity:0;
    transition:0.5s ease;
    background-color:rgb(129, 129, 129);
    border-radius:14px;
}

.img-container:hover .overlay{
    opacity:0.6;
}

.text{
    color:rgb(0, 247, 255);
    font-size:50px;
    font-family: sans-serif;
    font-weight: bold;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    /* opacity:0; */
    transition:0.5s ease;
}


.img-container:hover .text{
    opacity:2;
}

</style>
</head>

<body>

<h2>Image Hover Effect</h2>

<div class="img-container">

    <img src="SOU_logo.jpg" alt="SOU LOGO">

    <div class="overlay">
        <div class="text">Hello!</div>
    </div>
</div>
</body>
</html>
