<!DOCTYPE html>
<head>
    <title>Student Registration Form</title>
</head>
<body>
    <h3>Student Registration</h3>
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter Your Name" required><br>
        <br>
        <label>Enrollment:</label>
        <input type="text" placeholder="Enter Your Enrollment" required><br>
        <br>
        <label>Branch:</label>
        <select>
            <option>CSE</option><br>
            <option>AI/ML</option><br>
            <option>EC</option><br>
            <option>IOT</option><br>
        </select>
        <label>Division:</label>
        <input type="text" maxlength="1" ><br><br>
        <label>Gender</label>
        <input type="radio" id="male" value="Male" name="Gender">Male
        <input type="radio" id="female" value="Female" name="Gender">Female<br><br>
        <label>Mobile Number:</label>
        <input type="number" id="Mobile Number" placeholder="Enter Mobile No." required><br><br>
        <label>Email:</label>
        <input type="email" id="email" placeholder="Enter Your Mail Id" required><br><br>
        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter Password" required><br><br>
        <label>Photo:</label>
        <input type="file" required><br><br>
        <label>Remarks</label>
        <textarea id="Remarks" placeholder="Enter Your Remark" required></textarea><br><br>
        <button type="submit">Submit</button><br><br>
        <button type="reset">Clear</button><br><br>
    </form>
</body>
</html>
